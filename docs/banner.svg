<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 300" width="1280" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#21262D"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="300" fill="url(#bg)"/>
  <rect width="1280" height="300" fill="url(#dots)" opacity="0.5"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="300" fill="#22c55e"/>

  <!-- Shield icon -->
  <g transform="translate(52, 48)">
    <path d="M75 0 L150 34 L150 112 Q150 168 75 198 Q0 168 0 112 L0 34 Z"
          fill="none" stroke="#22c55e" stroke-width="2" opacity="0.7"/>
    <path d="M75 15 L138 44 L138 112 Q138 158 75 183 Q12 158 12 112 L12 44 Z"
          fill="#22c55e" opacity="0.05"/>
    <text x="75" y="115" text-anchor="middle" dominant-baseline="middle"
          fill="#22c55e" font-family="'Courier New', monospace"
          font-size="28" font-weight="700" letter-spacing="3" opacity="0.9">CA</text>
    <line x1="22" y1="138" x2="128" y2="138" stroke="#22c55e" stroke-width="1.5" opacity="0.3"/>
    <line x1="22" y1="154" x2="105" y2="154" stroke="#22c55e" stroke-width="1.5" opacity="0.2"/>
  </g>

  <!-- Title -->
  <text x="238" y="112"
        fill="#F0F6FC"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="46" font-weight="700" letter-spacing="-1.5">Certificate Middleware</text>

  <text x="238" y="168"
        fill="#22c55e"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="46" font-weight="700" letter-spacing="-1.5">Assistant</text>

  <!-- Tagline -->
  <text x="240" y="212"
        fill="#8B949E"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="17">Instalação automática de drivers para tokens de certificado digital ICP-Brasil</text>

  <!-- Pill: ICP-Brasil -->
  <rect x="240" y="232" width="102" height="26" rx="13" fill="none" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="291" y="250" text-anchor="middle"
        fill="#58a6ff" font-family="system-ui, sans-serif" font-size="12" font-weight="600">ICP-Brasil</text>

  <!-- Pill: Open Source -->
  <rect x="354" y="232" width="114" height="26" rx="13" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <text x="411" y="250" text-anchor="middle"
        fill="#22c55e" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Open Source</text>

  <!-- Pill: MIT License -->
  <rect x="480" y="232" width="100" height="26" rx="13" fill="none" stroke="#6e7681" stroke-width="1.5"/>
  <text x="530" y="250" text-anchor="middle"
        fill="#8B949E" font-family="system-ui, sans-serif" font-size="12" font-weight="600">MIT License</text>

  <!-- Right card -->
  <rect x="874" y="48" width="356" height="210" rx="10" fill="#161B22" stroke="#30363D" stroke-width="1"/>

  <text x="894" y="74"
        fill="#6E7681" font-family="system-ui, sans-serif" font-size="11"
        font-weight="600" letter-spacing="1.5">PLATAFORMAS SUPORTADAS</text>
  <line x1="894" y1="84" x2="1210" y2="84" stroke="#30363D" stroke-width="1"/>

  <!-- Windows row -->
  <rect x="894" y="97" width="316" height="48" rx="6" fill="#1C2128"/>
  <rect x="894" y="97" width="4" height="48" rx="2" fill="#0078D4"/>
  <text x="910" y="118" fill="#E6EDF3" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Windows 10+</text>
  <text x="910" y="135" fill="#6E7681" font-family="system-ui, sans-serif" font-size="12">x64 · Requer administrador</text>
  <circle cx="1196" cy="118" r="5" fill="#22c55e"/>
  <text x="1182" y="122" text-anchor="end" fill="#22c55e" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Ativo</text>

  <!-- macOS row -->
  <rect x="894" y="155" width="316" height="48" rx="6" fill="#1C2128"/>
  <rect x="894" y="155" width="4" height="48" rx="2" fill="#A2AAAD"/>
  <text x="910" y="176" fill="#E6EDF3" font-family="system-ui, sans-serif" font-size="14" font-weight="600">macOS 10–15</text>
  <text x="910" y="193" fill="#6E7681" font-family="system-ui, sans-serif" font-size="12">Apple Silicon + Intel</text>
  <circle cx="1196" cy="175" r="5" fill="#d97706"/>
  <text x="1182" y="179" text-anchor="end" fill="#d97706" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Beta</text>

  <!-- Card footer -->
  <line x1="894" y1="212" x2="1210" y2="212" stroke="#30363D" stroke-width="1"/>
  <text x="894" y="232" fill="#6E7681" font-family="system-ui, sans-serif" font-size="12">Tokens: SafeNet 5100 · SafeNet 5110</text>

  <!-- Bottom accent bar -->
  <rect y="288" width="1280" height="12" fill="#22c55e" opacity="0.85"/>
</svg>
