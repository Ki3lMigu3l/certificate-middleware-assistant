name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Release
    runs-on: windows-latest

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 22

  - name: Setup PNPM
    uses: pnpm/action-setup@v4
    with:
      version: 10

  - name: Get PNPM Store Directory
    shell: bash
    run: |
      echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

  - name: Setup PNPM Cache
    uses: actions/cache@v4
    with:
      path: ${{ env.STORE_PATH }}
      key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
      restore-keys: |
        ${{ runner.os }}-pnpm-

  - name: Setup Rust
    uses: dtolnay/rust-toolchain@stable

  - name: Cache Rust Dependencies
    uses: Swatinem/rust-cache@v2
    with:
      workspaces: apps/desktop/src-tauri

  - name: Install Dependencies
    run: pnpm install --no-frozen-lockfile

  - name: Build Application
    working-directory: apps/desktop
    run: pnpm tauri build

  - name: Prepare Release Assets
    shell: pwsh
    run: |
      $version = "${{ github.ref_name }}".Replace("v", "")

      New-Item -ItemType Directory -Force -Path release-assets

      Copy-Item `
        "apps/desktop/src-tauri/target/release/CMA.exe" `
        "release-assets/CMA-$version-x64.exe"

      $nsis = Get-ChildItem `
        "apps/desktop/src-tauri/target/release/bundle/nsis/*.exe" |
        Select-Object -First 1

      Copy-Item `
        $nsis.FullName `
        "release-assets/CMA-$version-x64-setup.exe"

      $msi = Get-ChildItem `
        "apps/desktop/src-tauri/target/release/bundle/msi/*.msi" |
        Select-Object -First 1

      Copy-Item `
        $msi.FullName `
        "release-assets/CMA-$version-x64.msi"

  - name: Generate SHA256 Checksums
    shell: pwsh
    run: |
      Get-ChildItem release-assets -File |
        ForEach-Object {
          $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
          "$hash  $($_.Name)"
        } |
        Set-Content release-assets/SHA256SUMS.txt

  - name: Verify Release Assets
    shell: pwsh
    run: |
      Get-ChildItem release-assets

  - name: Create GitHub Release
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    shell: pwsh
    run: |
      $version = "${{ github.ref_name }}".Replace("v", "")

      $notes = @"
      ## Windows

      • CMA-$version-x64-setup.exe → Instalador recomendado para a maioria dos usuários.

      • CMA-$version-x64.msi → Instalação corporativa e distribuição por equipes de TI.

      • CMA-$version-x64.exe → Versão portátil, sem instalação.

      ## Integridade

      • SHA256SUMS.txt → Hashes SHA256 para validação dos arquivos.

      ## macOS

      Em breve.
      "@

      Set-Content release-notes.md $notes

      gh release create "${{ github.ref_name }}" `
        release-assets/* `
        --title "Certificate Middleware Assistant ${{ github.ref_name }}" `
        --notes-file release-notes.md
